<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>정통명리학 사주풀이 — 관리자</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f1ea;
    --surface: #ffffff;
    --border: #e5dfd0;
    --text: #1a1208;
    --text-muted: #7a6a52;
    --gold: #b8860b;
    --gold-bg: #fdf8ee;
    --gold-border: rgba(184,134,11,0.3);
    --accent: #b8860b;
    --accent-bg: #fdf8ee;
    --success: #15803d;
    --success-bg: #f0fdf4;
    --warning: #b45309;
    --warning-bg: #fffbeb;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', -apple-system, sans-serif; font-size: 14px; line-height: 1.6; }

  /* TOP BAR */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 15px; font-weight: 700; font-family: 'Noto Serif KR', serif; color: var(--gold); }
  .topbar-sub { font-size: 12px; color: var(--text-muted); margin-left: 10px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 56px); }

  /* LIST PANEL */
  .list-panel { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; }
  .list-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 10; }
  .list-header span { font-size: 13px; font-weight: 600; }
  .count-badge { background: var(--gold-bg); color: var(--gold); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--gold-border); }

  .filter-bar { padding: 10px 1.25rem; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: var(--bg); color: var(--text-muted); transition: all 0.15s; }
  .filter-btn.active { background: var(--gold-bg); color: var(--gold); border-color: var(--gold); }

  .search-bar { padding: 8px 1.25rem; border-bottom: 1px solid var(--border); }
  .search-bar input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
  .search-bar input:focus { border-color: var(--gold); }

  .app-item { padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .app-item:hover { background: var(--bg); }
  .app-item.selected { background: var(--gold-bg); border-left: 3px solid var(--gold); }
  .app-item-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
  .app-item-meta { font-size: 12px; color: var(--text-muted); }

  .status-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .s-접수완료 { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border); }
  .s-분석중  { background: var(--warning-bg); color: var(--warning); }
  .s-완료    { background: var(--success-bg); color: var(--success); }

  .empty-list { padding: 3rem 1.25rem; text-align: center; color: var(--text-muted); font-size: 13px; }

  /* DETAIL PANEL */
  .detail-panel { overflow-y: auto; padding: 1.5rem 2rem; }
  .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 14px; flex-direction: column; gap: 0.5rem; }
  .detail-empty span { font-size: 2rem; }

  .detail-topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
  .detail-name { font-size: 1.2rem; font-weight: 700; font-family: 'Noto Serif KR', serif; margin-bottom: 4px; }
  .detail-sub { font-size: 13px; color: var(--text-muted); }
  .detail-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 16px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: var(--bg); }
  .btn-accent { background: var(--gold); color: #fff; border-color: var(--gold); }
  .btn-accent:hover { opacity: 0.88; }
  .btn-success { background: var(--success-bg); color: var(--success); border-color: var(--success); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

  .status-select { font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); cursor: pointer; font-family: inherit; }

  /* INFO BLOCKS */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; }
  .info-card.full { grid-column: 1 / -1; }
  .info-card-title { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; font-family: 'Noto Serif KR', serif; }
  .info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-row .k { color: var(--text-muted); }
  .info-row .v { font-weight: 500; max-width: 200px; text-align: right; word-break: break-all; }

  .items-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .item-tag { font-size: 11px; padding: 3px 9px; background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border); border-radius: 20px; }

  .question-box { font-size: 14px; line-height: 1.8; color: var(--text); background: var(--warning-bg); border-left: 3px solid #f59e0b; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 12px 14px; white-space: pre-wrap; }
  .empty-box { font-size: 13px; color: var(--text-muted); }

  /* JSON PREVIEW */
  .json-preview { background: #1e1e2e; border-radius: var(--radius); padding: 1rem 1.25rem; font-size: 12px; font-family: 'Courier New', monospace; color: #cdd6f4; line-height: 1.7; max-height: 300px; overflow-y: auto; white-space: pre; margin-top: 0.75rem; }

  /* MEMO */
  .memo-area { width: 100%; padding: 10px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); resize: vertical; min-height: 80px; font-family: inherit; line-height: 1.7; }
  .memo-area:focus { outline: none; border-color: var(--gold); }

  /* LOADING */
  .loading { padding: 2rem; text-align: center; color: var(--text-muted); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .list-panel { height: auto; max-height: 40vh; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex; align-items:center;">
    <div class="topbar-title">정통명리학 사주연구소</div>
    <span class="topbar-sub">접수 관리</span>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="loadApplications()">🔄 새로고침</button>
    <button class="btn btn-accent" onclick="downloadAllJson()">전체 JSON 다운로드</button>
  </div>
</div>

<div class="layout">

  <!-- 목록 -->
  <div class="list-panel">
    <div class="list-header">
      <span>접수 목록</span>
      <span class="count-badge" id="countBadge">0</span>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterBy('전체', this)">전체</button>
      <button class="filter-btn" onclick="filterBy('접수완료', this)">접수완료</button>
      <button class="filter-btn" onclick="filterBy('분석중', this)">분석중</button>
      <button class="filter-btn" onclick="filterBy('완료', this)">완료</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="이름 검색..." oninput="renderList()">
    </div>
    <div id="appList"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 상세 -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <span>☰</span>
      왼쪽 목록에서 접수 건을 선택하세요
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAE8rAFComcr9rHWQAIL_lrV5bQd8ucmU8",
  authDomain: "saju-reading.firebaseapp.com",
  databaseURL: "https://saju-reading-default-rtdb.firebaseio.com",
  projectId: "saju-reading",
  storageBucket: "saju-reading.firebasestorage.app",
  messagingSenderId: "1000224028532",
  appId: "1:1000224028532:web:6bef82eaa25148bdb19e21",
  measurementId: "G-M8JE7L6N99"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allApps = [];
let currentFilter = '전체';
let selectedId = null;

async function loadApplications() {
  document.getElementById('appList').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const snap = await db.ref('saju_applications').get();
    if (!snap.exists()) {
      allApps = [];
    } else {
      const raw = snap.val();
      allApps = Object.entries(raw).map(([key, val]) => ({ id: key, ...val }));
      allApps.sort((a, b) => {
        const ta = a.submittedAt || 0;
        const tb = b.submittedAt || 0;
        return tb - ta;
      });
    }
    renderList();
  } catch (e) {
    document.getElementById('appList').innerHTML = `<div class="loading" style="color:#dc2626;">오류: ${e.message}</div>`;
  }
}

function renderList() {
  const keyword = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  let filtered = currentFilter === '전체' ? allApps : allApps.filter(a => (a.status || '접수완료') === currentFilter);
  if (keyword) filtered = filtered.filter(a => (a.name || '').toLowerCase().includes(keyword));

  document.getElementById('countBadge').textContent = filtered.length;
  const el = document.getElementById('appList');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-list">접수 건이 없습니다.</div>';
    return;
  }
  el.innerHTML = filtered.map(app => {
    const status = app.status || '접수완료';
    const dateStr = app.submittedAt ? new Date(app.submittedAt).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
    const birthtime = app.birthtime ? ` ${app.ampm || ''} ${app.birthtime}` : (app.ampm && app.ampm !== '모름' ? ` ${app.ampm}` : '');
    return `
      <div class="app-item ${selectedId === app.id ? 'selected' : ''}" onclick="selectApp('${app.id}')">
        <div class="app-item-name">
          ${escHtml(app.name || '(미입력)')}
          <span class="status-badge s-${status}">${status}</span>
        </div>
        <div class="app-item-meta">
          ${app.gender || ''}성 · 만 ${app.age || '?'}세 · ${app.birthdate || ''}${birthtime}<br>
          ${dateStr}
        </div>
      </div>`;
  }).join('');
}

function filterBy(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function selectApp(id) {
  selectedId = id;
  renderList();
  const app = allApps.find(a => a.id === id);
  if (app) renderDetail(app);
}

function renderDetail(app) {
  const status = app.status || '접수완료';
  const submittedAt = app.submittedAt ? new Date(app.submittedAt).toLocaleString('ko-KR') : '—';

  // 출생 시각 표시
  let birthtimeDisplay = '—';
  if (app.birthtime) {
    birthtimeDisplay = `${app.ampm || ''} ${app.birthtime}`.trim();
  } else if (app.ampm && app.ampm !== '모름') {
    birthtimeDisplay = app.ampm;
  } else {
    birthtimeDisplay = '모름';
  }

  // 풀이 요청 항목
  const itemsHtml = (app.requestItems && app.requestItems.length > 0)
    ? `<div class="items-list">${app.requestItems.map(i => `<span class="item-tag">${escHtml(i)}</span>`).join('')}</div>`
    : '<span class="empty-box">(없음)</span>';

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-topbar">
      <div>
        <div class="detail-name">${escHtml(app.name || '(미입력)')}</div>
        <div class="detail-sub">${app.gender || ''}성 · 만 ${app.age || '?'}세 · 접수: ${submittedAt}</div>
      </div>
      <div class="detail-actions">
        <select class="status-select" onchange="updateStatus('${app.id}', this.value)">
          <option ${status === '접수완료' ? 'selected' : ''}>접수완료</option>
          <option ${status === '분석중'  ? 'selected' : ''}>분석중</option>
          <option ${status === '완료'    ? 'selected' : ''}>완료</option>
        </select>
        <button class="btn btn-success" onclick="downloadJson('${app.id}')">📥 JSON</button>
        <button class="btn btn-danger"  onclick="deleteApp('${app.id}')">삭제</button>
      </div>
    </div>

    <div class="info-grid">

      <div class="info-card">
        <div class="info-card-title">기본 정보</div>
        <div class="info-row"><span class="k">이름</span><span class="v">${escHtml(app.name || '—')}</span></div>
        <div class="info-row"><span class="k">성별</span><span class="v">${app.gender || '—'}성</span></div>
        <div class="info-row"><span class="k">나이</span><span class="v">만 ${app.age || '—'}세</span></div>
        <div class="info-row"><span class="k">생년월일</span><span class="v">${app.birthdate || '—'} (${app.calType || '양력'})</span></div>
        <div class="info-row"><span class="k">출생 시각</span><span class="v">${birthtimeDisplay}</span></div>
        <div class="info-row"><span class="k">시각 확실성</span><span class="v">${app.timeCertainty || '—'}</span></div>
      </div>

      <div class="info-card">
        <div class="info-card-title">연락처 / 접수 정보</div>
        <div class="info-row"><span class="k">연락처</span><span class="v">${escHtml(app.contact || '—')}</span></div>
        <div class="info-row"><span class="k">이메일</span><span class="v">${escHtml(app.email || '—')}</span></div>
        <div class="info-row"><span class="k">접수 경로</span><span class="v">${escHtml(app.referral || '—')}</span></div>
        <div class="info-row"><span class="k">접수번호</span><span class="v" style="font-size:11px;">${app.receiptId || app.id}</span></div>
        <div class="info-row"><span class="k">접수일시</span><span class="v">${submittedAt}</span></div>
        <div class="info-row"><span class="k">상태</span><span class="v"><span class="status-badge s-${status}">${status}</span></span></div>
      </div>

      <div class="info-card full">
        <div class="info-card-title">풀이 요청 항목</div>
        ${itemsHtml}
      </div>

      <div class="info-card full">
        <div class="info-card-title">추가 전달 사항</div>
        ${app.message
          ? `<div class="question-box">${escHtml(app.message)}</div>`
          : '<div class="empty-box">(없음)</div>'}
      </div>

      <div class="info-card full">
        <div class="info-card-title">운영자 메모</div>
        <textarea class="memo-area" id="memo_${app.id}" placeholder="분석 메모, 진행 상황 등을 기록하세요...">${escHtml(app.adminMemo || '')}</textarea>
        <div style="margin-top:8px; text-align:right;">
          <button class="btn btn-accent" onclick="saveMemo('${app.id}')">메모 저장</button>
        </div>
      </div>

      <div class="info-card full">
        <div class="info-card-title" style="display:flex; justify-content:space-between; align-items:center;">
          JSON 미리보기
          <button class="btn btn-success" onclick="downloadJson('${app.id}')">📥 JSON 다운로드 (Claude에 첨부)</button>
        </div>
        <div class="json-preview">${escHtml(JSON.stringify(app, null, 2))}</div>
      </div>

    </div>
  `;
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function updateStatus(id, status) {
  try {
    await db.ref(`saju_applications/${id}/status`).set(status);
    const app = allApps.find(a => a.id === id);
    if (app) { app.status = status; renderList(); }
  } catch(e) { alert('상태 변경 실패: ' + e.message); }
}

async function saveMemo(id) {
  const memo = document.getElementById(`memo_${id}`)?.value || '';
  try {
    await db.ref(`saju_applications/${id}/adminMemo`).set(memo);
    const app = allApps.find(a => a.id === id);
    if (app) app.adminMemo = memo;
    alert('메모가 저장되었습니다.');
  } catch(e) { alert('메모 저장 실패: ' + e.message); }
}

function downloadJson(id) {
  const app = allApps.find(a => a.id === id);
  if (!app) return;
  const date = app.submittedAt ? new Date(app.submittedAt).toISOString().slice(0,10) : '';
  const filename = `사주_${app.name || 'unknown'}_${date}.json`;
  const blob = new Blob([JSON.stringify(app, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function downloadAllJson() {
  if (allApps.length === 0) { alert('다운로드할 데이터가 없습니다.'); return; }
  const date = new Date().toISOString().slice(0,10);
  const blob = new Blob([JSON.stringify(allApps, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `사주_전체접수_${date}.json`; a.click();
  URL.revokeObjectURL(url);
}

async function deleteApp(id) {
  if (!confirm('이 접수 건을 삭제하시겠습니까? 복구할 수 없습니다.')) return;
  try {
    await db.ref(`saju_applications/${id}`).remove();
    allApps = allApps.filter(a => a.id !== id);
    selectedId = null;
    renderList();
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><span>🗑</span>삭제되었습니다.</div>';
  } catch(e) { alert('삭제 실패: ' + e.message); }
}

loadApplications();
</script>
</body>
</html>
